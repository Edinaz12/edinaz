<svg width="1000" height="1160" viewBox="0 0 1000 1160" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#141414" stroke-width="1"/>
    </pattern>
    <radialGradient id="blob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="titleClip">
      <text x="500" y="158" text-anchor="middle" font-size="92" font-weight="800" letter-spacing="6">edinaz</text>
    </clipPath>
    <clipPath id="mottoClip">
      <text x="500" y="512" text-anchor="middle" font-size="36" font-weight="800" letter-spacing="5">AIMING FOR GREATNESS</text>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1000" height="1160" fill="#050505"/>
  <rect width="1000" height="1160" fill="url(#grid)"/>
  <circle cx="500" cy="140" r="360" fill="url(#blob)">
    <animate attributeName="cx" values="380;620;380" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- scanline sweeping the whole canvas -->
  <rect x="0" width="1000" height="2" fill="#ffffff" opacity="0.05">
    <animate attributeName="y" values="-10;1160" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- floating particles -->
  <g fill="#ffffff">
    <circle cx="150" cy="90" r="2"><animate attributeName="opacity" values="0;0.5;0" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="120" r="1.8"><animate attributeName="opacity" values="0;0.6;0" dur="4.4s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="430" r="1.6"><animate attributeName="opacity" values="0;0.5;0" dur="6s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="470" r="2"><animate attributeName="opacity" values="0;0.55;0" dur="5.2s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="820" r="1.7"><animate attributeName="opacity" values="0;0.5;0" dur="5.8s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="860" r="1.5"><animate attributeName="opacity" values="0;0.45;0" dur="6.4s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="60" r="1.5"><animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="2.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== HERO ===== -->
  <text x="500" y="158" text-anchor="middle" filter="url(#glow)" fill="#ffffff" font-size="92" font-weight="800" letter-spacing="6" opacity="0.22">
    edinaz<animate attributeName="opacity" values="0.12;0.30;0.12" dur="3.2s" repeatCount="indefinite"/>
  </text>
  <text x="500" y="158" text-anchor="middle" fill="#d6d6d6" font-size="92" font-weight="800" letter-spacing="6">edinaz</text>
  <g clip-path="url(#titleClip)">
    <rect x="-360" y="70" width="240" height="120" fill="url(#shimmer)" opacity="0.9">
      <animate attributeName="x" from="-360" to="1000" dur="3.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <line x1="348" y1="186" x2="652" y2="186" stroke="#ffffff" stroke-width="2" filter="url(#softglow)"/>
  <text x="500" y="226" text-anchor="middle" fill="#7a7a7a" font-family="'Courier New', monospace" font-size="15" letter-spacing="6">C++ DEVELOPER &#8226; SYSTEMS &#8226; FOUNDER OF ezn.sys</text>

  <!-- ===== IDENTITY ===== -->
  <text x="500" y="372" text-anchor="middle" fill="#f2f2f2" font-size="40" font-weight="700">Live close to the metal.</text>
  <text x="500" y="414" text-anchor="middle" fill="#8a8a8a" font-family="'Courier New', monospace" font-size="19">C++ &amp; low-level by obsession, web by trade.</text>

  <text x="500" y="512" text-anchor="middle" filter="url(#glow)" fill="#ffffff" font-size="36" font-weight="800" letter-spacing="5" opacity="0.25">
    AIMING FOR GREATNESS<animate attributeName="opacity" values="0.15;0.4;0.15" dur="2.8s" repeatCount="indefinite"/>
  </text>
  <text x="500" y="512" text-anchor="middle" fill="#cfcfcf" font-size="36" font-weight="800" letter-spacing="5">AIMING FOR GREATNESS</text>
  <g clip-path="url(#mottoClip)">
    <rect x="-300" y="480" width="180" height="60" fill="url(#shimmer)" opacity="0.85">
      <animate attributeName="x" from="-300" to="1000" dur="4.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== EZN.SYS ===== -->
  <text x="500" y="600" text-anchor="middle" fill="#4f4f4f" font-family="'Courier New', monospace" font-size="14" letter-spacing="3">// ezn.sys</text>
  <rect x="290" y="620" width="420" height="128" rx="18" fill="#0a0a0a" stroke="#1d1d1d" stroke-width="1.5"/>
  <circle cx="324" cy="650" r="6" fill="#ff5f57"/>
  <circle cx="346" cy="650" r="6" fill="#febc2e"/>
  <circle cx="368" cy="650" r="6" fill="#28c840"/>
  <circle cx="636" cy="648" r="5" fill="#28c840" filter="url(#softglow)">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="648" y="653" fill="#6b6b6b" font-family="'Courier New', monospace" font-size="13">online</text>
  <text x="500" y="712" text-anchor="middle" font-family="'Courier New', monospace" font-size="46" font-weight="700">
    <tspan fill="#ffffff">ezn</tspan><tspan fill="#727272"> .sys</tspan>
  </text>
  <text x="500" y="788" text-anchor="middle" fill="#7a7a7a" font-family="'Courier New', monospace" font-size="14" letter-spacing="2">Z&#252;rich, Switzerland &#183; web design &amp; hosting</text>

  <!-- ===== STACK MANIFEST ===== -->
  <text x="500" y="858" text-anchor="middle" fill="#4f4f4f" font-family="'Courier New', monospace" font-size="14" letter-spacing="3">// stack</text>
  <rect x="225" y="878" width="550" height="158" rx="14" fill="#0a0a0a" stroke="#1c1c1c" stroke-width="1.5"/>
  <g font-family="'Courier New', monospace" font-size="15">
    <text x="252" y="914"><tspan fill="#28c840">$</tspan><tspan fill="#9a9a9a"> cat stack.txt</tspan></text>
    <text x="252" y="946"><tspan fill="#ffffff">web&#160;&#160;&#160;&#160;&#160;</tspan><tspan fill="#4f4f4f"> &#8594; </tspan><tspan fill="#a8a8a8">react  next  typescript  tailwind  node</tspan></text>
    <text x="252" y="974"><tspan fill="#ffffff">hosting</tspan><tspan fill="#4f4f4f"> &#8594; </tspan><tspan fill="#a8a8a8">nginx  linux  cloudflare</tspan></text>
    <text x="252" y="1002"><tspan fill="#ffffff">systems</tspan><tspan fill="#4f4f4f"> &#8594; </tspan><tspan fill="#a8a8a8">c++  c  asm  cmake  reverse-engineering</tspan></text>
    <text x="252" y="1024" fill="#28c840">_<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></text>
  </g>

  <!-- ===== FOOTER ===== -->
  <line x1="350" y1="1090" x2="650" y2="1090" stroke="#1c1c1c" stroke-width="1"/>
  <text x="500" y="1124" text-anchor="middle" fill="#5a5a5a" font-family="'Courier New', monospace" font-size="14" letter-spacing="2">github.com/Edinaz12</text>
</svg>
