<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#171717"/>
      <stop offset="55%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="blob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="titleClip">
      <text x="600" y="174" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="96" font-weight="800" letter-spacing="6">edinaz</text>
    </clipPath>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGlow)"/>

  <!-- drifting glow blob -->
  <circle cx="300" cy="160" r="320" fill="url(#blob)">
    <animate attributeName="cx" values="300;900;300" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;120;160" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- animated grid -->
  <g stroke="#1c1c1c" stroke-width="1" opacity="0.55">
    <g>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-48 -48" dur="9s" repeatCount="indefinite"/>
      <line x1="-48" y1="0" x2="-48" y2="320"/><line x1="0" y1="0" x2="0" y2="320"/>
      <line x1="48" y1="0" x2="48" y2="320"/><line x1="96" y1="0" x2="96" y2="320"/>
      <line x1="144" y1="0" x2="144" y2="320"/><line x1="192" y1="0" x2="192" y2="320"/>
      <line x1="240" y1="0" x2="240" y2="320"/><line x1="288" y1="0" x2="288" y2="320"/>
      <line x1="336" y1="0" x2="336" y2="320"/><line x1="384" y1="0" x2="384" y2="320"/>
      <line x1="432" y1="0" x2="432" y2="320"/><line x1="480" y1="0" x2="480" y2="320"/>
      <line x1="528" y1="0" x2="528" y2="320"/><line x1="576" y1="0" x2="576" y2="320"/>
      <line x1="624" y1="0" x2="624" y2="320"/><line x1="672" y1="0" x2="672" y2="320"/>
      <line x1="720" y1="0" x2="720" y2="320"/><line x1="768" y1="0" x2="768" y2="320"/>
      <line x1="816" y1="0" x2="816" y2="320"/><line x1="864" y1="0" x2="864" y2="320"/>
      <line x1="912" y1="0" x2="912" y2="320"/><line x1="960" y1="0" x2="960" y2="320"/>
      <line x1="1008" y1="0" x2="1008" y2="320"/><line x1="1056" y1="0" x2="1056" y2="320"/>
      <line x1="1104" y1="0" x2="1104" y2="320"/><line x1="1152" y1="0" x2="1152" y2="320"/>
      <line x1="1200" y1="0" x2="1200" y2="320"/><line x1="1248" y1="0" x2="1248" y2="320"/>
      <line x1="-48" y1="-48" x2="1248" y2="-48"/><line x1="-48" y1="0" x2="1248" y2="0"/>
      <line x1="-48" y1="48" x2="1248" y2="48"/><line x1="-48" y1="96" x2="1248" y2="96"/>
      <line x1="-48" y1="144" x2="1248" y2="144"/><line x1="-48" y1="192" x2="1248" y2="192"/>
      <line x1="-48" y1="240" x2="1248" y2="240"/><line x1="-48" y1="288" x2="1248" y2="288"/>
      <line x1="-48" y1="336" x2="1248" y2="336"/>
    </g>
  </g>

  <!-- particles -->
  <g fill="#ffffff">
    <circle cx="160" cy="80" r="2"><animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/><animate attributeName="cy" values="80;60;80" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="240" r="1.6"><animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="1s" repeatCount="indefinite"/><animate attributeName="cy" values="240;220;240" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="70" r="2.2"><animate attributeName="opacity" values="0;0.7;0" dur="4.5s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="cy" values="70;50;70" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="250" r="1.8"><animate attributeName="opacity" values="0;0.55;0" dur="5.5s" begin="2s" repeatCount="indefinite"/><animate attributeName="cy" values="250;232;250" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="60" r="1.5"><animate attributeName="opacity" values="0;0.5;0" dur="6s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="255" r="1.7"><animate attributeName="opacity" values="0;0.6;0" dur="4.8s" begin="2.4s" repeatCount="indefinite"/><animate attributeName="cy" values="255;238;255" dur="7.2s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="180" r="1.4"><animate attributeName="opacity" values="0;0.45;0" dur="5.2s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="150" r="1.6"><animate attributeName="opacity" values="0;0.5;0" dur="5.7s" begin="1.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ambient glow title -->
  <text x="600" y="174" text-anchor="middle" filter="url(#glow)" fill="#ffffff"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="6" opacity="0.25">
    edinaz<animate attributeName="opacity" values="0.12;0.32;0.12" dur="3.2s" repeatCount="indefinite"/>
  </text>

  <!-- base title -->
  <text x="600" y="174" text-anchor="middle" fill="#d6d6d6"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="6">edinaz</text>

  <!-- shimmer sweep -->
  <g clip-path="url(#titleClip)">
    <rect x="-360" y="86" width="240" height="120" fill="url(#shimmer)" opacity="0.9">
      <animate attributeName="x" from="-360" to="1200" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- accent underline -->
  <line x1="448" y1="202" x2="752" y2="202" stroke="#ffffff" stroke-width="2"
        stroke-dasharray="304" stroke-dashoffset="304" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" from="304" to="0" dur="1.4s" begin="0.4s" fill="freeze"/>
  </line>

  <!-- subtitle -->
  <text x="600" y="240" text-anchor="middle" fill="#7a7a7a"
        font-family="'Courier New', monospace" font-size="15" letter-spacing="6" opacity="0">
    C++ DEVELOPER &#8226; SYSTEMS &#8226; FOUNDER OF ezn.sys
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="1s" fill="freeze"/>
  </text>

  <!-- corner accents -->
  <text x="42" y="50" fill="#2e2e2e" font-family="'Courier New', monospace" font-size="20" font-weight="700">&lt;/&gt;</text>
  <text x="1130" y="290" fill="#2e2e2e" font-family="'Courier New', monospace" font-size="20" font-weight="700">{ }</text>
</svg>
